<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>碲化铋颗粒分选设备 - 工程图四视图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;color:#ccc;font-family:'Microsoft YaHei','PingFang SC',sans-serif}
.header{background:#0d0d0d;padding:14px 20px;border-bottom:2px solid #2a6;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.header h1{font-size:18px;color:#fff}
.header .sub{font-size:12px;color:#888}
.toolbar button{padding:5px 14px;background:#333;color:#ccc;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:12px;margin-left:6px}
.toolbar button:hover{background:#444}
.grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:2px;padding:2px;background:#111;height:calc(100vh - 64px)}
.panel{background:#1e1e1e;position:relative;border:1px solid #333;display:flex;flex-direction:column;min-height:300px}
.panel h3{padding:6px 10px;font-size:13px;color:#aaa;background:#161616;border-bottom:1px solid #333;display:flex;justify-content:space-between;flex-shrink:0}
.panel h3 .badge{font-size:10px;color:#2a6}
.canvas-wrap{flex:1;position:relative;overflow:hidden;min-height:200px}
canvas{display:block;position:absolute;top:0;left:0}
.legend{position:absolute;bottom:6px;right:10px;font-size:10px;color:#777;background:rgba(0,0,0,0.75);padding:4px 8px;border-radius:3px;line-height:1.5}
.legend span{display:inline-block;width:10px;height:2px;margin-right:5px;vertical-align:middle}
.hint{position:absolute;top:6px;left:10px;font-size:10px;color:#555;pointer-events:none}
@media(max-width:900px){.grid{grid-template-columns:1fr;height:auto}}
</style>
</head>
<body>

<div class="header">
<div><h1>碲化铋颗粒缺陷智能检测与分选设备 — 工程图四视图</h1>
<div class="sub">外形 1060×990×1850mm | 滚轮缩放 · 拖拽平移 · 双击重置</div></div>
<div class="toolbar">
<button onclick="fitAll()">适合窗口</button>
<button onclick="resetView()">重置全部</button>
</div>
</div>

<div class="grid">
<div class="panel"><h3>正视图（前视）<span class="badge">检测区+电气区全貌</span></h3>
<div class="canvas-wrap"><canvas id="cv0"></canvas></div>
<div class="legend"><span style="background:#fff"></span>轮廓 <span style="background:#888"></span>隐藏 <span style="background:#4a9"></span>部件 <span style="background:#e84"></span>剖面 <span style="background:#ff9"></span>尺寸</div>
</div>
<div class="panel"><h3>侧视图（右侧视）<span class="badge">深度方向·内部设备</span></h3>
<div class="canvas-wrap"><canvas id="cv1"></canvas></div>
<div class="hint">滚轮缩放 | 拖拽平移 | 双击重置</div>
</div>
<div class="panel"><h3>俯视图<span class="badge">盘面·6相机·分选工位</span></h3>
<div class="canvas-wrap"><canvas id="cv2"></canvas></div>
<div class="hint">滚轮缩放 | 拖拽平移 | 双击重置</div>
</div>
<div class="panel"><h3>内部结构剖视图<span class="badge">前门打开·剖面·公差表</span></h3>
<div class="canvas-wrap"><canvas id="cv3"></canvas></div>
<div class="hint">含装配公差表 + 穿板线缆清单</div>
</div>
</div>

<script>
(function(){
// 参数 (mm)
const W=1060, D=990, H=1850, HUP=950, HDN=900, DR=200, PILLAR=60, BEAM=40;

const views = [
{ offsetX:0, offsetY:0, scale:0.28 },
{ offsetX:0, offsetY:0, scale:0.28 },
{ offsetX:0, offsetY:0, scale:0.45 },
{ offsetX:0, offsetY:0, scale:0.28 },
];

const cvs = [0,1,2,3].map(i=>document.getElementById('cv'+i));
const wraps = cvs.map(c=>c.parentElement);

function initSizes(){
cvs.forEach((cv,i)=>{
const w=cv.parentElement.clientWidth;
const h=cv.parentElement.clientHeight;
cv.width=w; cv.height=h;
cv.style.width=w+'px'; cv.style.height=h+'px';
if(views[i].offsetX===0){
views[i].offsetX=w/2;
views[i].offsetY=h/2;
if(i===2) views[i].scale=0.45;
}
});
}

// 辅助函数 - 全部在屏幕坐标系中操作
function line(i,color,lw,x1,y1,x2,y2){
const ctx=cvs[i].getContext('2d'), v=views[i];
ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=lw;
const tx=(px)=>px*v.scale+v.offsetX;
const ty=(py)=>-py*v.scale+v.offsetY;
ctx.moveTo(tx(x1),ty(y1)); ctx.lineTo(tx(x2),ty(y2)); ctx.stroke();
}
function rect(i,color,lw,x,y,w,h){
const ctx=cvs[i].getContext('2d'), v=views[i];
ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=lw;
const tx=(px)=>px*v.scale+v.offsetX;
const ty=(py)=>-py*v.scale+v.offsetY;
ctx.rect(tx(x),ty(y+h),w*v.scale,h*v.scale); ctx.stroke();
}
function circle(i,color,lw,cx,cy,r){
const ctx=cvs[i].getContext('2d'), v=views[i];
ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=lw;
ctx.arc(cx*v.scale+v.offsetX, -cy*v.scale+v.offsetY, r*v.scale, 0, Math.PI*2); ctx.stroke();
}
function arc(i,color,lw,cx,cy,r,sa,ea){
const ctx=cvs[i].getContext('2d'), v=views[i];
ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=lw;
ctx.arc(cx*v.scale+v.offsetX, -cy*v.scale+v.offsetY, r*v.scale, sa, ea); ctx.stroke();
}
function text(i,color,size,x,y,str,ha){
const ctx=cvs[i].getContext('2d'), v=views[i];
ctx.save();
ctx.fillStyle=color;
ctx.font=`${Math.max(9,size*v.scale)}px "Microsoft YaHei","PingFang SC",sans-serif`;
ctx.textAlign=ha||'center';
ctx.textBaseline='middle';
ctx.fillText(str, x*v.scale+v.offsetX, -y*v.scale+v.offsetY);
ctx.restore();
}
function dimH(i,x1,y,x2,txt,off){
off=off||60;
const col='#ff9';
line(i,col,1.5,x1,y-off,x1,y-off-30);
line(i,col,1.5,x2,y-off,x2,y-off-30);
line(i,col,1.5,x1,y-off,x2,y-off);
line(i,col,1.5,x1,y-off,x1+35,y-off-10);
line(i,col,1.5,x1,y-off,x1+35,y-off+10);
line(i,col,1.5,x2,y-off,x2-35,y-off-10);
line(i,col,1.5,x2,y-off,x2-35,y-off+10);
text(i,'#ff9',30,(x1+x2)/2,y-off-50,txt);
}
function dimV(i,x,y1,y2,txt,off){
off=off||60;
const col='#ff9';
line(i,col,1.5,x-off,y1,x-off-30,y1);
line(i,col,1.5,x-off,y2,x-off-30,y2);
line(i,col,1.5,x-off,y1,x-off,y2);
line(i,col,1.5,x-off,y1,x-off-10,y1+35);
line(i,col,1.5,x-off,y1,x-off+10,y1+35);
line(i,col,1.5,x-off,y2,x-off-10,y2-35);
line(i,col,1.5,x-off,y2,x-off+10,y2-35);
text(i,'#ff9',26,x-off-70,(y1+y2)/2,txt);
}

function clearCanvas(i){
const ctx=cvs[i].getContext('2d'), c=cvs[i];
ctx.clearRect(0,0,c.width,c.height);
}

// ============ 正视图 ============
function drawFront(i){
const bx=0, by=0, cy=by+HDN;
clearCanvas(i);
rect(i,'#fff',3,bx,by,W,HDN);
line(i,'#888',1.5,bx+W/2,by+30,bx+W/2,by+HDN-30);
for(let j=0;j<8;j++){
const gy=by+60+j*25;
line(i,'#555',1,bx+40,gy,bx+100,gy);
line(i,'#555',1,bx+W-40,gy,bx+W-100,gy);
}
for(let px of [bx+PILLAR/2,bx+W-PILLAR/2])
line(i,'#fff',3,px,by,px,by+H);
rect(i,'#fff',3,bx,cy,W,HUP);
line(i,'#888',1.5,bx+W/2,cy+30,bx+W/2,cy+HUP-30);
for(let b_y of [cy+20,cy+HUP-BEAM-30,by+30,by+HDN-BEAM-30])
rect(i,'#4a9',2,bx,b_y,W,BEAM);
const platY=cy+HUP*0.55;
rect(i,'#e84',3,bx+100,platY,W-200,15);
text(i,'#e84',22,bx+W/2,platY-20,'减震平台');
rect(i,'#e84',3,bx+W/2-50,platY-28,100,28);
text(i,'#e84',20,bx+W/2,platY-45,'DD马达');
const discY=platY+15;
rect(i,'#4a9',3,bx+W/2-DR,discY,DR*2,10);
text(i,'#6cf',22,bx+W/2,discY+32,'光学玻璃盘 Φ400');
for(let px=-150;px<=150;px+=60)
circle(i,'#6cf',2,bx+W/2+px,discY+5,5);
const camsF=[[bx+W/2-180,discY+130,'C1'],[bx+W/2-100,discY+100,'C2'],
[bx+W/2,discY+170,'C3'],[bx+W/2+100,discY+100,'C4'],
[bx+W-40,discY+40,'C5'],[bx+W-260,discY+100,'C6']];
camsF.forEach(([cx,cy,nm])=>{
rect(i,'#4a9',2,cx-18,cy,36,22);
text(i,'#aaa',18,cx,cy-14,nm);
line(i,'#4a9',1,cx-8,cy-5,cx-8,cy-16);
});
circle(i,'#888',1,bx+W/2,discY-5,65);
text(i,'#888',18,bx+W/2+72,discY-5,'环形光源×6');
circle(i,'#4a9',2,bx+80,cy+HUP*0.35+15,32);
text(i,'#aaa',22,bx+80,cy+HUP*0.35-18,'振动盘');
rect(i,'#4a9',2,bx+55,cy+HUP*0.35+45,50,35);
text(i,'#aaa',18,bx+80,cy+HUP*0.35+85,'补料斗');
const sx=bx+W-160, sy=discY-10;
[['OK',0,'#4a9'],['NG',35,'#f66'],['回收',70,'#fa3']].forEach(([nm,ox,cl])=>{
line(i,cl,2,sx+ox,sy,sx+ox,sy-30);
line(i,cl,2,sx+ox,discY+20,sx+ox,sy);
text(i,cl,20,sx+ox+5,sy-40,nm);
});
text(i,'#fa3',20,sx+35,discY+38,'电磁阀×3');
rect(i,'#4a9',2,bx+20,by+HDN*0.45,100,80);
text(i,'#aaa',20,bx+70,by+HDN*0.45+92,'触摸屏 10寸');
circle(i,'#4a9',2,bx+35,by+HDN*0.45+40,12);
text(i,'#f66',18,bx+35,by+HDN*0.45+20,'急停');
circle(i,'#4a9',2,bx+70,by+HDN*0.45+35,8);
circle(i,'#4a9',2,bx+95,by+HDN*0.45+35,6);
circle(i,'#4a9',2,bx+W-50,by+HDN*0.7,7);
circle(i,'#4a9',2,bx+W-50,by+HDN*0.62,7);
circle(i,'#4a9',2,bx+W-50,by+HDN*0.54,7);
text(i,'#aaa',16,bx+W-30,by+HDN*0.62,'运行/待机/报警');
dimH(i,bx,by-20,bx+W,`${W}(宽)`);
dimV(i,bx-80,by,by+H,`${H}(高)`,80);
dimV(i,bx+W+70,cy,cy+HUP,`${HUP}(上部)`,70);
dimV(i,bx+W+100,by,by+HDN,`${HDN}(下部)`,110);
text(i,'#fff',38,bx+W/2,by+H+80,'正视图');
text(i,'#888',22,bx+W/2,by+H+45,`外形尺寸：${W}×${D}×${H} mm`);
}

// ============ 侧视图 ============
function drawSide(i){
const bx=0, by=0, cy=by+HDN;
clearCanvas(i);
rect(i,'#fff',3,bx,by,D,HDN);
rect(i,'#fff',3,bx,cy,D,HUP);
for(let px of [bx+PILLAR/2,bx+D-PILLAR/2])
line(i,'#fff',3,px,by,px,by+H);
line(i,'#888',1.5,bx+D/2,cy+20,bx+D/2,cy+HUP-20);
text(i,'#888',18,bx+D/2,cy+HUP/2,'侧门(螺栓固定)');
for(let b_y of [cy+20,cy+HUP-BEAM-30,by+30,by+HDN-BEAM-30])
rect(i,'#4a9',2,bx,b_y,D,BEAM);
const platY=cy+HUP*0.55;
rect(i,'#e84',3,bx+80,platY,D-160,15);
rect(i,'#e84',3,bx+D/2-30,platY-25,60,25);
const discY=platY+15;
rect(i,'#4a9',3,bx+D/2-DR,discY,DR*2,10);
for(let px=-120;px<=120;px+=60)
circle(i,'#6cf',2,bx+D/2+px,discY+5,5);
circle(i,'#4a9',2,bx+90,cy+HUP*0.35+15,28);
rect(i,'#4a9',2,bx+65,cy+HUP*0.35+40,50,35);
rect(i,'#4a9',2,bx+D-110,by+20,80,65);
text(i,'#aaa',20,bx+D-70,by+10,'空压机');
rect(i,'#4a9',2,bx+20,by+20,65,55);
text(i,'#aaa',20,bx+52,by+5,'PLC');
rect(i,'#4a9',2,bx+D/2-50,by+30,100,50);
text(i,'#aaa',20,bx+D/2,by+18,'工控机 4U');
for(let fx of [bx+50,bx+D-50])
rect(i,'#4a9',2,fx-12,by-18,24,18);
circle(i,'#4a9',2,bx+35,by+HDN-50,12);
text(i,'#aaa',18,bx+55,by+HDN-48,'AC220V');
circle(i,'#4a9',2,bx+D-35,by+HDN-50,12);
text(i,'#aaa',18,bx+D-55,by+HDN-48,'气源');
dimH(i,bx,by-20,bx+D,`${D}(深)`);
dimV(i,bx-80,by,by+H,`${H}(高)`,80);
dimV(i,bx+D+70,cy,cy+HUP,`${HUP}`,70);
dimV(i,bx+D+100,by,by+HDN,`${HDN}`,110);
text(i,'#fff',38,bx+D/2,by+H+80,'侧视图（右侧视）');
}

// ============ 俯视图 ============
function drawTop(i){
const bx=0, by=0;
const dcx=bx+W/2, dcy=by+D/2;
clearCanvas(i);
rect(i,'#fff',3,bx,by,W,D);
text(i,'#888',20,bx+W/2,by+D+35,`设备外壳 ${W}×${D}mm`);
rect(i,'#888',1.5,bx+PILLAR/2,by+PILLAR/2,W-PILLAR,D-PILLAR);
circle(i,'#4a9',3,dcx,dcy,DR);
circle(i,'#888',1,dcx,dcy,DR-10);
circle(i,'#888',1,dcx,dcy,DR-30);
text(i,'#6cf',20,dcx,dcy+DR+35,'DD马达驱动 Φ400');
text(i,'#888',16,dcx+DR-30,dcy-25,'颗粒排列圈 R170');
const angles=[0,60,120,180,240,300];
const names=['C1(侧)','C2(侧)','C3★俯视','C4(侧)','C5★仰视','C6(侧)'];
const cd=DR+65;
angles.forEach((ad,j)=>{
const ar=ad*Math.PI/180;
const cx=dcx+cd*Math.cos(ar), cy=dcy+cd*Math.sin(ar);
rect(i,'#4a9',2,cx-20,cy-12,40,24);
text(i,'#aaa',18,cx+26,cy+4,names[j]);
});
circle(i,'#4a9',2,bx+120,by+120,38);
text(i,'#aaa',20,bx+120,by+70,'精密振动盘');
rect(i,'#4a9',2,dcx+DR+35,dcy-55,45,22);
text(i,'#aaa',18,dcx+DR+65,dcy-44,'入料口');
rect(i,'#4a9',2,dcx+DR+35,dcy+20,45,22);
text(i,'#aaa',18,dcx+DR+65,dcy+31,'分选工位');
[['OK',65,'#4a9'],['NG',95,'#f66'],['回收',125,'#fa3']].forEach(([nm,dy,cl])=>{
rect(i,cl,1.5,dcx+DR+55,dcy+dy,30,20);
text(i,cl,16,dcx+DR+110,dcy+dy+10,nm);
});
circle(i,'#4a9',2,dcx-DR-12,dcy-45,8);
text(i,'#aaa',16,dcx-DR,dcy-62,'光纤传感器');
arc(i,'#fa3',2,dcx,dcy,DR-50,0.3,2.8);
text(i,'#fa3',20,dcx+DR-70,dcy-18,'旋转方向 →');
dimH(i,bx,by-20,bx+W,`${W}`);
dimV(i,bx+W+60,by,by+D,`${D}`,60);
text(i,'#fff',38,bx+W/2,by+D+75,'俯视图');
}

// ============ 剖视图 ============
function drawSection(i){
const dx=0, dy=0;
clearCanvas(i);
line(i,'#fff',3,dx,dy,dx+W,dy);
line(i,'#fff',3,dx,dy+H,dx+W,dy+H);
line(i,'#fff',3,dx,dy,dx,dy+H);
line(i,'#fff',3,dx+W,dy,dx+W,dy+H);
line(i,'#fff',3,dx,dy+HDN,dx+W,dy+HDN);
const platY=dy+HDN+50;
rect(i,'#e84',3,dx+80,platY-7,W-160,15);
text(i,'#e84',22,dx+W/2,platY-22,'减震平台');
rect(i,'#e84',3,dx+W/2-45,platY-27,90,27);
text(i,'#e84',20,dx+W/2,platY-44,'DD马达');
const discY=platY+8;
rect(i,'#4a9',3,dx+W/2-DR,discY,DR*2,12);
text(i,'#6cf',22,dx+W/2,discY+30,'光学玻璃盘 Φ400×10mm');
rect(i,'#888',1,dx+W/2-DR+18,discY+12,DR*2-36,5);
text(i,'#888',14,dx+W/2-DR+30,discY+28,'真空密封腔 -5~-15kPa');
line(i,'#4a9',1.5,dx+W/2-DR+12,discY+12,dx+W/2-DR+12,discY+26);
text(i,'#aaa',14,dx+W/2-DR+6,discY+36,'FKM密封');
for(let j=0;j<6;j++)
circle(i,'#6cf',2,dx+W/2-DR+28+j*70,discY+6,5);
rect(i,'#4a9',2,dx+W/2-20,discY+125,40,24);
text(i,'#aaa',18,dx+W/2+26,discY+135,'C3 俯视↓');
line(i,'#888',1,dx+W/2,discY+113,dx+W/2,discY+6);
rect(i,'#4a9',2,dx+W/2-20,discY-78,40,24);
text(i,'#aaa',18,dx+W/2+26,discY-68,'C5 仰视↑');
line(i,'#888',1,dx+W/2,discY-66,dx+W/2,discY);
[[dx+W/2-DR-45,discY-35,'C1'],[dx+W/2+DR+45,discY-35,'C4'],
[dx+W/2-DR-65,discY+45,'C2'],[dx+W/2+DR+65,discY+45,'C6']]
.forEach(([sx,sy,sn])=>{
rect(i,'#4a9',2,sx-14,sy-10,28,20);
text(i,'#aaa',14,sx+20,sy,`${sn}侧面`);
});
circle(i,'#888',1,dx+W/2,discY-5,68);
circle(i,'#4a9',2,dx+85,dy+HDN+HUP*0.68,28);
circle(i,'#4a9',2,dx+W/2-DR-6,discY+6,5);
text(i,'#aaa',16,dx+W/2-DR-28,discY+22,'光纤传感器');
const vx=dx+W/2+DR+15, vy=discY-18;
[['OK',0,'#4a9'],['NG',28,'#f66'],['回收',56,'#fa3']].forEach(([nm,ox,cl])=>{
rect(i,'#4a9',2,vx+ox,vy+5,22,18);
text(i,cl,16,vx+ox+11,vy-8,nm);
rect(i,'#888',1,vx+ox+4,vy-38,14,32);
});
rect(i,'#4a9',2,dx+30,dy+HDN+HUP-65,90,16);
text(i,'#aaa',16,dx+75,dy+HDN+HUP-40,'频闪控制器×3');
line(i,'#888',1,dx+20,dy+HDN*0.45,dx+W-20,dy+HDN*0.45);
text(i,'#888',16,dx+W/2,dy+HDN*0.45-14,'──── 隔板 ────');
rect(i,'#4a9',2,dx+30,dy+HDN*0.55,120,60);
text(i,'#aaa',18,dx+90,dy+HDN*0.55-14,'研华工控机 4U');
text(i,'#888',14,dx+90,dy+HDN*0.55-30,'i7-12700 RTX3060');
rect(i,'#4a9',2,dx+W-200,dy+HDN*0.55,75,48);
text(i,'#aaa',16,dx+W-162,dy+HDN*0.55-14,'IS620N伺服');
rect(i,'#4a9',2,dx+W-115,dy+HDN*0.55,65,22);
text(i,'#aaa',14,dx+W-82,dy+HDN*0.55-8,'PoE交换机');
rect(i,'#4a9',2,dx+W-200,dy+HDN*0.55+55,75,28);
text(i,'#aaa',14,dx+W-162,dy+HDN*0.55+75,'DC24V×2');
const cy4=dy+HDN*0.18;
rect(i,'#4a9',2,dx+30,cy4,65,32);
text(i,'#aaa',16,dx+62,cy4-14,'CPU 1214C');
for(let j=0;j<3;j++) rect(i,'#4a9',2,dx+105+j*42,cy4,38,32);
rect(i,'#4a9',2,dx+W-150,cy4,120,40);
text(i,'#aaa',16,dx+W-90,cy4+54,'空开/保险/端子排');
rect(i,'#4a9',2,dx+30,cy4+55,180,18);
text(i,'#888',14,dx+120,cy4+78,'真空: ZH13DS+IRV10+ZFA050');
rect(i,'#888',1,dx+30,cy4+80,W-60,12);
text(i,'#888',14,dx+W/2,cy4+76,'走线槽 | 电源线槽 · 信号线槽 · 网线独立管');
line(i,'#888',1,dx+W/2,dy+HDN*0.45,dx+W/2,dy+HDN);
text(i,'#888',14,dx+W/2+16,dy+HDN*0.72,'网线×6 触发线×6 传感器×4 气路×2');
text(i,'#aaa',16,dx+W+28,dy+30,'AC220V');
text(i,'#aaa',16,dx+W+28,dy+55,'气源');
text(i,'#aaa',16,dx+W+28,dy+80,'散热风扇×2');
const tx=dx+W+170, ty=dy+H-60;
text(i,'#fff',24,tx,ty,'关键装配尺寸要求');
['玻璃盘水平度 ≤0.05mm','DD马达同心度 ≤0.02mm','C3距盘面 120-180mm',
'侧面相机45°斜向下','喷嘴距盘面 2-5mm','密封圈压缩量15-25%']
.forEach((s,j)=>text(i,'#aaa',18,tx,ty-35-j*28,s,'left'));
text(i,'#fff',24,tx,ty-230,'穿板线缆清单');
['STP CAT6网线×6','RVVP 4×0.5 触发×6','RVV 2×1.0 光源×6',
'RVVP 3×0.3 传感器×4','RVV 2×0.75 电磁阀×3',
'RVV 3×1.5 振动盘×1','伺服专用电缆×1',
'Φ8 PU管×2','BVR 4mm²接地×1']
.forEach((s,j)=>text(i,'#888',14,tx,ty-255-j*22,s,'left'));
text(i,'#fff',38,dx+W/2,dy+H+60,'内部结构剖视图（前门打开·正视）');
text(i,'#888',22,dx+W/2,dy+H+28,'上部检测区 950mm / 下部电气区 900mm');
}

const drawFns = [drawFront, drawSide, drawTop, drawSection];

function drawAll(){
[0,1,2,3].forEach(i=>drawFns[i](i));
}

function fitAll(){
initSizes();
// 自动调整scale使视图适配画布
[0,1,2,3].forEach(i=>{
const v=views[i], c=cvs[i];
const bw=i===1?D:W, bh=i===2?D:H;
const sw=c.width*0.6, sh=c.height*0.6;
v.scale=Math.min(sw/bw, sh/bh);
v.offsetX=c.width/2;
v.offsetY=c.height/2;
});
drawAll();
}

function resetView(){
initSizes();
views.forEach((v,i)=>{
if(i===2) v.scale=0.45; else v.scale=0.28;
});
drawAll();
}

// 交互
cvs.forEach((cv,i)=>{
const wrap=wraps[i];
wrap.addEventListener('wheel',e=>{
e.preventDefault();
const v=views[i];
const rect=cv.getBoundingClientRect();
const mx=e.clientX-rect.left, my=e.clientY-rect.top;
const oldS=v.scale;
const newS=oldS*(e.deltaY<0?1.08:0.92);
if(newS>0.04&&newS<3){
const ox=(mx-v.offsetX)/oldS;
const oy=(my-v.offsetY)/oldS;
v.scale=newS;
v.offsetX=mx-ox*newS;
v.offsetY=my-oy*newS;
drawFns[i](i);
}
});
let dragging=false, sx,sy;
wrap.addEventListener('mousedown',e=>{dragging=true;sx=e.clientX;sy=e.clientY;});
wrap.addEventListener('mousemove',e=>{
if(!dragging)return;
views[i].offsetX+=e.clientX-sx;
views[i].offsetY+=e.clientY-sy;
sx=e.clientX;sy=e.clientY;
drawFns[i](i);
});
wrap.addEventListener('mouseup',()=>{dragging=false;});
wrap.addEventListener('mouseleave',()=>{dragging=false;});
wrap.addEventListener('dblclick',()=>{
const v=views[i],c=cvs[i];
v.offsetX=c.width/2; v.offsetY=c.height/2;
v.scale=i===2?0.45:0.28;
drawFns[i](i);
});
});

window.fitAll=fitAll;
window.resetView=resetView;

// 延迟初始化确保DOM就绪
setTimeout(()=>{
initSizes();
fitAll();
}, 100);

window.addEventListener('resize',()=>{
initSizes();
drawAll();
});

})();
</script>
