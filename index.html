<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股票双均线策略分析</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100">

<!-- 导航 -->
<nav class="bg-white shadow p-4 sticky top-0">
  <div class="max-w-6xl mx-auto flex justify-between items-center">
    <h1 class="text-xl font-bold text-blue-600">股票策略分析</h1>
    <div class="space-x-4 text-sm">
      <a href="#strategy" class="text-gray-700">策略</a>
      <a href="#chart" class="text-gray-700">走势</a>
      <a href="#backtest" class="text-gray-700">回测</a>
    </div>
  </div>
</nav>

<!-- 主体 -->
<div class="max-w-6xl mx-auto p-4 space-y-8 my-6">

  <!-- 策略说明 -->
  <section id="strategy" class="bg-white p-6 rounded-lg shadow">
    <h2 class="text-xl font-bold mb-3">📊 双均线交易策略</h2>
    <p class="text-gray-700">
      5日均线上穿20日均线 → 买入<br>
      5日均线下穿20日均线 → 卖出<br>
      适用于趋势跟踪，简单高效。
    </p>
  </section>

  <!-- 股价 + 均线走势图 -->
  <section id="chart" class="bg-white p-6 rounded-lg shadow">
    <h2 class="text-xl font-bold mb-4">📈 股价与均线走势</h2>
    <div class="h-80">
      <canvas id="stockChart"></canvas>
    </div>
  </section>

  <!-- 回测结果 -->
  <section id="backtest" class="bg-white p-6 rounded-lg shadow">
    <h2 class="text-xl font-bold mb-4">🧪 策略回测收益</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
      <div class="p-4 bg-green-50 rounded">
        <p class="text-sm text-gray-500">总收益</p>
        <p class="text-xl font-bold text-green-600">+28.3%</p>
      </div>
      <div class="p-4 bg-blue-50 rounded">
        <p class="text-sm text-gray-500">最大回撤</p>
        <p class="text-xl font-bold text-blue-600">-6.7%</p>
      </div>
      <div class="p-4 bg-orange-50 rounded">
        <p class="text-sm text-gray-500">交易次数</p>
        <p class="text-xl font-bold text-orange-600">11 次</p>
      </div>
    </div>
    <div class="h-60">
      <canvas id="profitChart"></canvas>
    </div>
  </section>
</div>

<!-- 底部 -->
<footer class="text-center p-5 text-gray-500 text-sm">
  股票策略分析 · 仅供学习参考 · 非投资建议
</footer>

<script>
// 股价走势图
const ctx1 = document.getElementById('stockChart').getContext('2d');
new Chart(ctx1, {
  type: 'line',
  data: {
    labels: Array.from({length: 60}, (_,i)=>i+1),
    datasets: [
      { label: '股价', data: Array.from({length:60},()=>100+Math.random()*20), borderColor: '#3b82f6', borderWidth:2, fill:false },
      { label: 'MA5', data: Array.from({length:60},()=>100+Math.random()*15), borderColor: '#10b981', borderWidth:1.5, fill:false },
      { label: 'MA20', data: Array.from({length:60},()=>100+Math.random()*10), borderColor: '#f97316', borderWidth:1.5, fill:false }
    ]
  },
  options: { responsive: true, maintainAspectRatio: false }
});

// 收益曲线
const ctx2 = document.getElementById('profitChart').getContext('2d');
new Chart(ctx2, {
  type: 'line',
  data: {
    labels: Array.from({length:60}, (_,i)=>i+1),
    datasets: [{
      label: '策略累计收益',
      data: Array.from({length:60}, (_,i)=>100 + i*0.4 + Math.random()*5),
      borderColor: '#16a34a',
      backgroundColor: 'rgba(22,163,74,0.1)',
      fill:true,
      tension:0.2
    }]
  },
  options: { responsive: true, maintainAspectRatio: false }
});
</script>

</body>
</html>
